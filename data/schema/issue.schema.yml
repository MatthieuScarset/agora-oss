---
description: Canonical Issue schema and mapping rules for normalization
entity: issue
fields:
  nid:
    type: integer
    source: nid
  title:
    type: string
    source: title
  body:
    type: string
    source: body
  created:
    type: integer
    source: created
    transform: timestamp_seconds
  changed:
    type: integer
    source: changed
    transform: timestamp_seconds
  author_id:
    type: integer
    source: author.id
  status:
    type: integer
    source: status
  priority:
    type: string
    source: field_priority
  component:
    type: string
    source: field_component
  url:
    type: string
    source: url
  comments:
    type: integer
    source: comment_count
  tags:
    type: list[string]
    source: tags

mapping_notes: |
  - `source` is a dot-separated path into each raw record.
  - Implementations should interpret missing nodes as null.
  - `transform: timestamp_seconds` indicates the mapper should coerce ISO
    timestamps or numeric milliseconds into unix seconds.
