# Quality Policy for Agora OSS
# Defines data quality requirements, freshness windows, deduplication logic, etc.

version: "1.0.0"

# Freshness windows: entities marked as stale if not updated within this time
staleness_windows:
  actor: 180 days      # 6 months
  project: 365 days    # 1 year
  issue: 30 days       # 1 month
  event: 1 day         # 1 day
  contribution: 365 days

# Deduplication settings
deduplication:
  enabled: true
  
  # Confidence threshold for automatic deduplication (0.0-1.0)
  # Only dedups with confidence >= threshold are applied automatically
  auto_dedup_threshold: 0.9
  
  # Rules for identity stitching (cross-source linking)
  stitching:
    # Email-based stitching (highest confidence)
    email_exact_match:
      enabled: true
      confidence: 1.0
      cross_source: true
      normalize: "lower_trim"
    
    # External profile URL matching
    external_profile_match:
      enabled: true
      confidence: 0.9
      cross_source: true
    
    # Name + domain heuristic
    name_domain_match:
      enabled: true
      confidence: 0.7
      cross_source: false

# Validation rules
validation:
  # Required fields per entity type
  required_fields:
    actor:
      - canonical_id
      - display_name
      - created_at
      - updated_at
      - source_family
      - source_name
      - source_native_id
    
    project:
      - canonical_id
      - name
      - created_at
      - updated_at
      - source_family
      - source_name
      - source_native_id
    
    issue:
      - canonical_id
      - title
      - state
      - project_id
      - created_at
      - updated_at
      - source_family
      - source_name
      - source_native_id
    
    contribution:
      - canonical_id
      - contribution_type
      - actor_id
      - target_id
      - created_at
      - updated_at
      - source_family
      - source_name
      - source_native_id
    
    relation:
      - canonical_id
      - from_id
      - to_id
      - relation_type
      - confidence
      - source_family
      - source_native_id
  
  # Allowed values for specific fields
  allowed_values:
    actor.activity_marker:
      - active
      - inactive
      - archived
    
    project.status:
      - active
      - archived
      - deprecated
      - beta
    
    issue.state:
      - open
      - closed
      - merged
      - duplicate
      - wontfix
    
    issue.type:
      - bug
      - feature
      - task
      - documentation
      - chore
    
    contribution.type:
      - commit
      - comment
      - code-review
      - issue-report
      - documentation
      - translation
    
    contribution.state:
      - proposed
      - accepted
      - rejected
      - merged
      - closed

# Data retention policy (for GDPR and compliance)
retention:
  # How long to keep raw source data (before purging from S3)
  raw_payload_retention_days: 90
  
  # Keep audit trail indefinitely (for compliance audits)
  audit_trail_retention_days: null  # null = keep forever
  
  # Keep canonical entities indefinitely (soft-delete only)
  canonical_entity_retention_days: null

# Monitoring & alerting thresholds
monitoring:
  # Alert if error rate exceeds this percentage
  error_rate_threshold_percent: 5
  
  # Alert if consecutive errors exceed this count
  consecutive_error_threshold: 10
  
  # Alert if no successful ingestion for this many hours
  max_staleness_hours: 48
  
  # Performance thresholds
  performance:
    # Alert if average response time exceeds this
    avg_response_time_ms: 1000
    
    # Alert if p99 latency exceeds this
    p99_latency_ms: 5000

# Data transformation & normalization
normalization:
  # Normalize email addresses
  email_normalization: "lower_trim"
  
  # Normalize display names
  name_normalization: "trim"
  
  # Timestamp conversion (convert all to ISO 8601 UTC)
  timestamp_normalization: "to_iso8601_utc"
