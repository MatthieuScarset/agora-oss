---
services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: agora-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./infra/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test:
        - CMD-SHELL
        - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
      interval: 5s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - data_net

  redis:
    image: redis:7-alpine
    container_name: agora-redis
    restart: unless-stopped
    command:
      - redis-server
      - --appendonly
      - "yes"
    ports:
      - "${REDIS_PORT}:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test:
        - CMD
        - redis-cli
        - ping
      interval: 5s
      timeout: 3s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.50"
    networks:
      - data_net

  minio:
    image: minio/minio:latest
    container_name: agora-minio
    restart: unless-stopped
    command: server /data --console-address ":${MINIO_CONSOLE_PORT}"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "${MINIO_API_PORT}:9000"
      - "${MINIO_CONSOLE_PORT}:${MINIO_CONSOLE_PORT}"
    volumes:
      - minio_data:/data
    security_opt:
      - no-new-privileges:true
    mem_limit: 512m
    cpus: "0.50"
    networks:
      - data_net

  prefect-server:
    image: prefecthq/prefect:3-python3.12
    container_name: agora-prefect-server
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      PREFECT_UI_API_URL: ${PREFECT_API_URL}
      PREFECT_LOGGING_LEVEL: ${PREFECT_LOG_LEVEL}
      PREFECT_SERVER_DATABASE_CONNECTION_URL: >-
        ${PREFECT_SERVER_DATABASE_CONNECTION_URL}
      PREFECT_API_DATABASE_CONNECTION_URL: >-
        ${PREFECT_SERVER_DATABASE_CONNECTION_URL}
      PREFECT_SERVER_DATABASE_SQLALCHEMY_CONNECT_ARGS_SEARCH_PATH: >-
        ${PREFECT_SERVER_DATABASE_SQLALCHEMY_CONNECT_ARGS_SEARCH_PATH}
    command:
      - /bin/sh
      - -c
      - |
        prefect server start --host 0.0.0.0 \
          --port ${PREFECT_API_PORT}
    ports:
      - "${PREFECT_API_PORT}:${PREFECT_API_PORT}"
    healthcheck:
      test:
        - CMD-SHELL
        - >-
          python -c "import urllib.request;
          urllib.request.urlopen('http://localhost:4200/api/health').read()" ||
          exit 1
      interval: 10s
      timeout: 5s
      retries: 20
    security_opt:
      - no-new-privileges:true
    mem_limit: 768m
    cpus: "0.75"
    networks:
      - app_net
      - data_net

  prefect-worker:
    image: prefecthq/prefect:3-python3.12
    container_name: agora-prefect-worker
    restart: unless-stopped
    depends_on:
      prefect-server:
        condition: service_healthy
    environment:
      PREFECT_API_URL: ${PREFECT_API_URL}
      PREFECT_LOGGING_LEVEL: ${PREFECT_LOG_LEVEL}
      PREFECT_WORK_POOL: ${PREFECT_WORK_POOL}
    command: >
      /bin/sh -c "prefect worker start --pool ${PREFECT_WORK_POOL} --type
      process"
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - data_net

  frontend:
    image: node:20-alpine
    container_name: agora-frontend
    restart: unless-stopped
    working_dir: /workspace/apps/dashboard
    environment:
      NODE_ENV: ${NODE_ENV}
      PORT: ${FRONTEND_PORT}
    volumes:
      - ./apps/dashboard:/workspace/apps/dashboard
      - dashboard_node_modules:/workspace/apps/dashboard/node_modules
    command: >
      /bin/sh -c ' if [ -f package.json ]; then
        if [ -f pnpm-lock.yaml ]; then
          corepack enable && pnpm install &&
          pnpm dev --host 0.0.0.0 --port "$${PORT}";
        elif [ -f yarn.lock ]; then
          yarn install && yarn dev --host 0.0.0.0 --port "$${PORT}";
        else
          npm install &&
          npm run dev -- --host 0.0.0.0 --port "$${PORT}";
        fi;
      else
        echo "No apps/dashboard/package.json found.";
        echo "Add the frontend app, then restart this service.";
        tail -f /dev/null;
      fi '
    ports:
      - "${FRONTEND_PORT}:${FRONTEND_PORT}"
    security_opt:
      - no-new-privileges:true
    mem_limit: 1g
    cpus: "1.0"
    networks:
      - app_net

volumes:
  postgres_data:
  redis_data:
  minio_data:
  dashboard_node_modules:

networks:
  app_net:
    name: ${COMPOSE_PROJECT_NAME}_app_net
  data_net:
    name: ${COMPOSE_PROJECT_NAME}_data_net
