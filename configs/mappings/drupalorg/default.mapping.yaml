version: "1.0.0"
source_family: "drupalorg"
description: "Default mapping for Drupal.org ecosystem (users, projects, issues)"

entity_mappings:
  actor:
    source_entity_name: "user"
    
    identity:
      template: "actor:drupalorg:drupalorg:user:{uid}"
      fields:
        - "uid"
    
    field_map:
      display_name: "name"
      email: "mail"
      avatar_url: "picture"
      created_at: "created"
      updated_at: "changed"
      primary_locale: "'en'"
      roles:
        source_field: "roles"
        transform: "split_comma"
      activity_marker:
        source_field: "status"
        transform: "case(status == 1, 'active', 'inactive')"
    
    relationships:
      - relation_type: "maintains"
        target_entity: "project"
        source_field: "maintained_projects"
        confidence: 1.0
      
      - relation_type: "contributes_to"
        target_entity: "project"
        source_field: "contributed_projects"
        confidence: 0.8

  project:
    source_entity_name: "node"
    
    identity:
      template: "project:drupalorg:drupalorg:project:{nid}"
      fields:
        - "nid"
    
    field_map:
      name: "title"
      description: "body"
      ecosystem: "'Drupal'"
      status:
        source_field: "status"
        transform: "case(status == 1, 'active', 'archived')"
      created_at: "created"
      updated_at: "changed"
      primary_locale: "'en'"
      maintainers:
        source_field: "maintainer_uid"
        transform: "wrap_in_array"
    
    relationships:
      - relation_type: "part_of"
        target_entity: "project"
        source_field: "parent_nid"
        confidence: 1.0
      
      - relation_type: "depends_on"
        target_entity: "project"
        source_field: "dependency_nids"
        confidence: 0.9

  issue:
    source_entity_name: "issue"
    
    identity:
      template: "issue:drupalorg:drupalorg:issue:{iid}"
      fields:
        - "iid"
    
    field_map:
      title: "title"
      description: "description"
      state:
        source_field: "status"
        transform: "case(status == 'open', 'open', status == 'closed', 'closed', 'open')"
      type:
        source_field: "issue_type"
        transform: "lower(issue_type)"
      project_id: "project_nid"
      reporter_id: "reporter_uid"
      assignee_ids:
        source_field: "assigned_to_uid"
        transform: "wrap_in_array"
      created_at: "created"
      updated_at: "changed"
      closed_at: "closed_at"
      primary_locale: "'en'"
    
    relationships:
      - relation_type: "reported"
        target_entity: "actor"
        source_field: "reporter_uid"
        confidence: 1.0
      
      - relation_type: "assigned_to"
        target_entity: "actor"
        source_field: "assigned_to_uid"
        confidence: 1.0

id_strategy:
  actor: "user.uid"
  project: "node.nid"
  issue: "issue.iid"

stitching_rules:
  - name: "email_exact_match"
    entity_type: "actor"
    match_fields:
      - "email"
    confidence: 1.0
    cross_source: true
  
  - name: "name_domain_match"
    entity_type: "actor"
    match_fields:
      - "name"
      - "email_domain"
    confidence: 0.7
    cross_source: false

field_transformations:
  created_at:
    expression: "timestamp_to_iso8601(created_at)"
    required: true
  
  updated_at:
    expression: "timestamp_to_iso8601(updated_at)"
    required: true
  
  email:
    expression: "lower(trim(email))"
    required: false
    default: null
  
  display_name:
    expression: "trim(name)"
    required: true

constants:
  source_family: "drupalorg"
  source_name: "drupal.org community"
