version: "1.0.0"
source_family: "wordpressorg"
description: "Default mapping for WordPress.org plugins ecosystem"

entity_mappings:
  actor:
    source_entity_name: "author"
    
    identity:
      template: "actor:wordpressorg:wordpressorg:author:{slug}"
      fields:
        - "slug"
    
    field_map:
      display_name: "display_name"
      avatar_url: "avatar_url"
      created_at: "'2000-01-01T00:00:00Z'"  # WordPress.org doesn't expose author creation
      updated_at: "'2000-01-01T00:00:00Z'"
      primary_locale: "'en'"
      roles:
        source_field: "roles"
        transform: "case(roles == 'plugin_author', 'maintainer', 'contributor')"
      activity_marker: "'active'"
    
    relationships:
      - relation_type: "maintains"
        target_entity: "project"
        source_field: "plugin_slugs"
        confidence: 1.0

  project:
    source_entity_name: "plugin"
    
    identity:
      template: "project:wordpressorg:wordpressorg:plugin:{slug}"
      fields:
        - "slug"
    
    field_map:
      name: "name"
      description: "description"
      ecosystem: "'WordPress'"
      status:
        source_field: "status"
        transform: "case(status == 'active', 'active', 'archived')"
      created_at: "added"
      updated_at: "last_updated"
      primary_locale: "'en'"
      maintainers:
        source_field: "author_slug"
        transform: "wrap_in_array"
    
    relationships:
      - relation_type: "depends_on"
        target_entity: "project"
        source_field: "requires_plugins"
        confidence: 0.8

  contribution:
    source_entity_name: "plugin_review"
    
    identity:
      template: "contribution:wordpressorg:wordpressorg:review:{plugin_slug}:{reviewer_id}"
      fields:
        - "plugin_slug"
        - "reviewer_id"
    
    field_map:
      title: "title"
      description: "review_text"
      contribution_type: "'review'"
      actor_id: "reviewer_id"
      target_id: "plugin_slug"
      target_type: "'project'"
      state: "'accepted'"
      created_at: "date"
      updated_at: "date"
      primary_locale: "'en'"

id_strategy:
  actor: "author.slug"
  project: "plugin.slug"
  contribution: "plugin_review.id"

stitching_rules:
  - name: "email_exact_match"
    entity_type: "actor"
    match_fields:
      - "email"
    confidence: 1.0
    cross_source: true
  
  - name: "author_slug_match"
    entity_type: "actor"
    match_fields:
      - "slug"
    confidence: 0.8
    cross_source: false

field_transformations:
  created_at:
    expression: "timestamp_to_iso8601(created_at)"
    required: true
  
  updated_at:
    expression: "timestamp_to_iso8601(updated_at)"
    required: true
  
  display_name:
    expression: "trim(display_name)"
    required: true

constants:
  source_family: "wordpressorg"
  source_name: "wordpress.org plugins"
