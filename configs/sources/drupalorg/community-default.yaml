# Drupal.org community source configuration
# This is a pilot source for Phase 1 that ingests ecosystem data from Drupal.org

name: "drupal.org community"
source_family: "drupalorg"

connector:
  plugin_name: "drupalorg"
  plugin_version: "1.0.0"
  capabilities:
    - "discover_capabilities"
    - "fetch_full"
    - "fetch_incremental"
    - "emit_raw_envelope"
    - "map_to_canonical"
    - "report_health"

endpoints:
  # Drupal.org users / community members
  - url: "https://www.drupal.org/api-d7/user.json"
    entity_type: "actor"
    method: "GET"
    pagination:
      strategy: "offset"
      page_size: 100
    rate_limit:
      requests_per_second: 5
      burst_size: 20

  # Drupal.org projects / modules / themes
  - url: "https://www.drupal.org/api-d7/node.json"
    entity_type: "project"
    method: "GET"
    pagination:
      strategy: "offset"
      page_size: 100
    rate_limit:
      requests_per_second: 5
      burst_size: 20

  # Drupal.org issues
  - url: "https://www.drupal.org/api-d7/issues.json"
    entity_type: "issue"
    method: "GET"
    pagination:
      strategy: "offset"
      page_size: 100
    rate_limit:
      requests_per_second: 5
      burst_size: 20

authentication:
  type: "none"

refresh_policy:
  interval: "0 */6 * * *"  # Every 6 hours
  strategy: "incremental"
  timeout_seconds: 3600

quality_policy: "quality-policy.yaml"
mapping_pack: "drupalorg/default.mapping.yaml"

locales:
  - "en"

primary_locale: "en"

metadata:
  ecosystem: "Drupal"
  maintainer: "Drupal Community"
  contact: "security@drupal.org"
  tags:
    - "drupal-ecosystem"
    - "modules"
    - "themes"
    - "core"

enabled: false  # Start disabled; enable after testing
