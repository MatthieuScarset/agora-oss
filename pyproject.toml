[project]
name = "agora-oss"
version = "0.1.0"
description = "Open-source knowledge graph for FLOSS community data"
readme = "README.md"
requires-python = ">=3.12"
dependencies = [
    "fastapi>=0.136.1",
    "httpx>=0.27.0",
    "jsonschema>=4.22.0",
    "mkdocs>=1.5.0",
    "prefect>=3.4.7",
    "pre-commit>=4.6.0",
    "psycopg[binary]>=3.2.9",
    "pydantic>=2.13.3",
    "pydantic-settings>=2.7.1",
    "pydantic-ai>=1.89.1",
    "pyyaml>=6.0.2",
    "redis>=6.2.0",
    "sqlmodel>=0.0.27",
]

[dependency-groups]
dev = [
    "mypy>=1.11.2",
    "pytest>=8.3.2",
    "ruff>=0.6.9",
    "types-pyyaml>=6.0.12.20250516",
]

[tool.pytest.ini_options]
minversion = "8.0"
testpaths = ["tests"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "W"]

[tool.mypy]
files = ["apps", "packages"]
python_version = "3.12"
strict = true
warn_unused_configs = true
explicit_package_bases = true
mypy_path = "."
